<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>LinguaKids</title>
  <link rel="stylesheet" href="style.css" />

 
</head>
<body>

  <!-- HOŞ GELDİNİZ EKRANI -->
  <div id="welcome-screen" class="screen active bg-welcome">
    <h1 class="logo">LinguaKids 🎮</h1>
    <p class="subtitle">Eğlenerek Dil Öğren</p>
  </div>

  <!-- MENÜ EKRANI -->
  <div id="menu-screen" class="screen bg-welcome">
    <h2>Menü</h2>
    <button onclick="startGame()">▶ Oyna</button>
    <button id="matchingBtn" style="display:none;" onclick="startMatching()">
    🧩 Eşleştirme
  </button>
    <button id="matchingBtn" style="display:none;">🧩 Eşleştirme</button>
    <button id="voiceBtn" style="display:none;">🎤 Sesli Komut</button>
    <button onclick="openSettings()">⚙ Ayarlar</button>
  </div>

  <!-- OYUN EKRANI (MEVCUT UYGULAMAN) -->
  <div id="game-screen" class="screen">
    <div class="animated-bg">
     <span></span>
     <span></span>
     <span></span>
    </div>

    <div class="container">
      <h1>LinguaKids 🎮</h1>

      <div class="theme-switcher">
        <button onclick="setTheme('light')">☀️</button>
        <button onclick="setTheme('dark')">🌙</button>
        <button onclick="setTheme('kids')">🌈</button>
      </div>

      <div id="user-info">
        <p>⭐ Level: <span id="level">-</span></p>
        <p>🔥 Puan: <span id="score">-</span></p>
      </div>

      <div class="xp-container">
       <div class="xp-bar" id="xpBar"></div>
      </div>

      <div id="game-box" class="card">
        <div class="image-box">
          <img id="wordImage" src="" />
        </div>
        <h2 id="word">Kelime yükleniyor...</h2>
        <p id="feedback"></p>
      </div>

      <div class="input-area">
       <input type="text" id="answerInput" placeholder="Cevabı yaz..." />
       <button type="button" id="submitBtn">Tamam</button>
      </div>


      <button id="restartBtn" onclick="restartGame()" style="display:none;">
        🔁 Yeni Tur Başla
      </button>
    </div>

  </div>

  <script src="game.js"></script>

  <!-- MATCHING SCREEN -->
<div id="matching-screen" class="screen">

  <div class="container">
    <h1>🧩 Eşleştirme Modu</h1>

    <div class="matching-area">
      <div id="leftColumn" class="column"></div>
      <div id="rightColumn" class="column"></div>
    </div>

    <button onclick="showScreen('menu-screen')">⬅ Menü</button>
  </div>

</div>

<!-- LEVEL UP MODAL -->
<div id="levelModal" class="modal">
  <div class="modal-content">
    <h2 id="levelTitle">🎉 Level Up!</h2>
    <p id="levelMessage"></p>
    <button onclick="closeLevelModal()">Tamam</button>
  </div>
</div>
</body>

</html>
