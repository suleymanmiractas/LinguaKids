<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>LinguaKids</title>
  <link rel="stylesheet" href="style.css" />

 
</head>
<body>

  <!-- HOŞ GELDİNİZ EKRANI -->
  <div id="welcome-screen" class="screen active bg-welcome">
    <h1 class="logo">LinguaKids 🎮</h1>
    <p class="subtitle">Eğlenerek Dil Öğren</p>
  </div>

  <!-- MENÜ EKRANI -->
  <div id="menu-screen" class="screen bg-welcome">
    <h2>Menü</h2>
    <button onclick="startGame()">▶ Oyna</button>
    <button onclick="openSettings()">⚙ Ayarlar</button>
  </div>

  <!-- OYUN EKRANI (MEVCUT UYGULAMAN) -->
  <div id="game-screen" class="screen">

    <div class="container">
      <h1>LinguaKids 🎮</h1>

      <div class="theme-switcher">
        <button onclick="setTheme('light')">☀️</button>
        <button onclick="setTheme('dark')">🌙</button>
        <button onclick="setTheme('kids')">🌈</button>
      </div>

      <div id="user-info">
        <p>⭐ Level: <span id="level">-</span></p>
        <p>🔥 Puan: <span id="score">-</span></p>
      </div>

      <div id="game-box" class="card">
        <div class="image-box">🖼️</div>
        <h2 id="word">Kelime yükleniyor...</h2>
        <p id="feedback"></p>
      </div>

      <div class="buttons">
        <button onclick="answer(true)">✅ Doğru</button>
        <button onclick="answer(false)">❌ Yanlış</button>
      </div>

      <button id="restartBtn" onclick="restartGame()" style="display:none;">
        🔁 Yeni Tur Başla
      </button>
    </div>

  </div>

  <script src="game.js"></script>
</body>

</html>
