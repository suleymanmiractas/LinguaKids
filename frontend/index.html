<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>LinguaKids</title>
  <link rel="stylesheet" href="style.css" />

 
</head>
<body>

  <div class="container">
    <h1>LinguaKids 🎮</h1>
     <div class="theme-switcher">
  <button onclick="setTheme('light')">☀️</button>
  <button onclick="setTheme('dark')">🌙</button>
  <button onclick="setTheme('kids')">🌈</button>
</div>

    <div id="user-info">
      <p>Level: <span id="level">-</span></p>
      <p>Puan: <span id="score">-</span></p>
    </div>

   <div id="game-box" class="card">

  <!-- Görsel Alan -->
  <div class="image-box">
    🖼️
  </div>

  <!-- Kelime -->
  <h2 id="word">Kelime yükleniyor...</h2>

  <!-- Geri Bildirim -->
  <p id="feedback"></p>
</div>



    <div class="buttons">
      <button onclick="answer(true)">✅ Doğru</button>
      <button onclick="answer(false)">❌ Yanlış</button>
    </div>
    <button id="restartBtn" onclick="restartGame()" style="display:none;">
  🔁 Yeni Tur Başla
</button>
  </div>

  <script src="game.js"></script>



  
</body>
</html>
